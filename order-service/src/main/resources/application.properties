server.port=8086
spring.application.name=order-service

# EUREKA
eureka.client.service-url.defaultZone=http://eureka:password@localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.hostname}:${server.port}:${random.uuid}
eureka.instance.prefer-ip-address=true

# SECURITY
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8085/realms/spring-boot-microservices-realm
# DATABASE (CSDL) (Fix Bottleneck 1)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/order-service?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.datasource.hikari.maximum-pool-size=80
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# REDIS (Fix Bottleneck 2)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=200
spring.data.redis.lettuce.pool.max-idle=50
spring.data.redis.lettuce.pool.min-idle=10

# Số luồng: Để cao hơn DB Pool (80) để xử lý serialization/validation
#server.tomcat.threads.max=200
#server.tomcat.threads.min-spare=20

server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50

