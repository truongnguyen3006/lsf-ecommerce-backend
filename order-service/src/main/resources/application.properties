# TOMCAT & TIMEOUTS
#spring.mvc.async.request-timeout=30s
spring.mvc.async.request-timeout=300000

spring.kafka.listener.ack-mode=batch

#logging.level.root=WARN
server.tomcat.accept-count=2000
server.tomcat.max-connections=8192

#mới thêm
#server.tomcat.connection-timeout=60000
server.tomcat.connection-timeout=310000
# Tomcat chờ keep-alive (quan trọng)
server.tomcat.keep-alive-timeout=310000
# Số lượng request tối đa trên 1 connection trước khi bắt buộc đóng
server.tomcat.max-keep-alive-requests=20000

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
#logging.level.root=ERROR

# Thêm ${random.uuid} vào cuối để mỗi instance có 1 thư mục riêng
spring.kafka.streams.properties.state.dir=${java.io.tmpdir}/kafka-streams/${spring.application.name}/${random.uuid}


#mới
#spring.kafka.properties.schema.registry.url=${lsf.kafka.schema-registry-url}
lsf.kafka.bootstrap-servers=localhost:9092
lsf.kafka.schema-registry-url=http://localhost:8081

lsf.kafka.consumer.group-id=order-updater-group
lsf.kafka.consumer.auto-offset-reset=earliest
lsf.kafka.consumer.batch=true
lsf.kafka.consumer.concurrency=10
lsf.kafka.consumer.max-poll-records=1000

lsf.kafka.consumer.retry.attempts=3
lsf.kafka.consumer.retry.backoff=200ms

lsf.kafka.dlq.enabled=true
lsf.kafka.dlq.suffix=.DLQ

lsf.kafka.producer.acks=all
lsf.kafka.producer.idempotence=true
lsf.kafka.producer.retries=10
lsf.kafka.producer.max-in-flight=5
lsf.kafka.producer.compression=snappy
lsf.kafka.producer.linger-ms=5
lsf.kafka.producer.batch-size=65536

lsf.kafka.observability.observation-enabled=true
app.order.payment-result.idempotency.store=auto
app.order.payment-result.idempotency.require-redis=false
lsf.eventing.producer-name=${spring.application.name}
lsf.eventing.listener.enabled=true
lsf.eventing.consume-topics[0]=payment-processed-envelope-topic
lsf.eventing.consume-topics[1]=payment-failed-envelope-topic
lsf.eventing.ignore-unknown-event-type=true
lsf.eventing.idempotency.enabled=true
lsf.eventing.idempotency.store=${app.order.payment-result.idempotency.store:auto}
lsf.eventing.idempotency.require-redis=${app.order.payment-result.idempotency.require-redis:false}
lsf.eventing.idempotency.key-prefix=lsf:order:payment-result:idemp:{groupId}:

# tắt eureka để test dễ dàng
#eureka.client.enabled=false

# lsf-outbox
lsf.outbox.enabled=true
lsf.outbox.table=lsf_outbox

lsf.outbox.publisher.enabled=true
lsf.outbox.publisher.scheduling-enabled=true
lsf.outbox.publisher.poll-interval=1s
lsf.outbox.publisher.initial-delay=1s
lsf.outbox.publisher.batch-size=50
lsf.outbox.publisher.lease=10s
lsf.outbox.publisher.backoff-base=1s
lsf.outbox.publisher.backoff-max=60s
lsf.outbox.publisher.max-retries=10
lsf.outbox.publisher.send-timeout=10s
lsf.outbox.publisher.claim-strategy=SKIP_LOCKED

#admin
lsf.outbox.admin.enabled=true
lsf.outbox.admin.base-path=/admin/outbox
lsf.outbox.admin.default-limit=50
lsf.outbox.admin.max-limit=200
lsf.outbox.admin.allow-retry=true
lsf.outbox.admin.allow-delete=false

#format ngày giờ
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

#observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus,beans,conditions
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.prometheus.metrics.export.enabled=true

lsf.observability.enabled=true
lsf.observability.mdc-enabled=true
lsf.observability.metrics-enabled=true
lsf.observability.tracing-enabled=true

lsf.observability.tag-topic=true
lsf.observability.tag-event-type=true
lsf.observability.tag-outcome=true
lsf.observability.tag-event-id=false
management.tracing.sampling.probability=1.0

lsf.outbox.metrics.enabled=true

#logging.level.com.myorg.lsf.outbox.mysql.OutboxPublisher=INFO
#logging.level.com.myorg.lsf.outbox.mysql.JdbcOutboxWriter=DEBUG
logging.level.org.apache.kafka=ERROR
