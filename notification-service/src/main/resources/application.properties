spring.application.name=notification-service
server.port=8087

# Eureka
eureka.client.service-url.defaultZone=http://eureka:password@localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.hostname}:${server.port}:${random.uuid}
eureka.instance.prefer-ip-address=true

# Spring Kafka (legacy listeners still use these settings)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.concurrency=6
spring.kafka.listener.ack-mode=batch

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8085/realms/spring-boot-microservices-realm

# Producer props
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.json.KafkaJsonSchemaSerializer
spring.kafka.properties.schema.registry.url=http://localhost:8081
spring.kafka.producer.properties.schema.registry.url=${spring.kafka.properties.schema.registry.url}
spring.kafka.producer.properties.retries=0
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.buffer.memory=67108864
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.batch.size=32768
spring.kafka.producer.properties.compression.type=snappy
spring.kafka.producer.properties.connections.max.idle.ms=10000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.delivery.timeout.ms=60000
spring.kafka.producer.properties.max.request.size=1048576

# LSF Kafka starter (used for the new generic/eventing listener path)
lsf.kafka.bootstrap-servers=${spring.kafka.bootstrap-servers}
lsf.kafka.schema-registry-url=${spring.kafka.properties.schema.registry.url}
lsf.kafka.consumer.group-id=${spring.kafka.consumer.group-id}
lsf.kafka.consumer.auto-offset-reset=${spring.kafka.consumer.auto-offset-reset}
lsf.kafka.consumer.batch=false
lsf.kafka.consumer.concurrency=2
lsf.kafka.consumer.max-poll-records=200
lsf.kafka.dlq.enabled=true
lsf.kafka.observability.observation-enabled=true

# LSF eventing starter
lsf.eventing.consume-topics[0]=order-status-envelope-topic
lsf.eventing.consume-topics[1]=payment-processed-envelope-topic
lsf.eventing.consume-topics[2]=payment-failed-envelope-topic
lsf.eventing.ignore-unknown-event-type=true
lsf.eventing.idempotency.enabled=true
lsf.eventing.idempotency.store=memory
lsf.eventing.idempotency.key-prefix=lsf:notification:idemp:{groupId}:

# LSF observability starter
lsf.observability.enabled=true
lsf.observability.mdc-enabled=true
lsf.observability.metrics-enabled=true
lsf.observability.tracing-enabled=true
lsf.observability.tag-topic=true
lsf.observability.tag-event-type=true
lsf.observability.tag-outcome=true
lsf.observability.tag-event-id=false

# Actuator / Prometheus
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.health.show-details=always

# Tomcat / WebSocket tuning
server.tomcat.max-connections=20000
server.tomcat.accept-count=3000
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
server.tomcat.connection-timeout=30000
spring.mvc.async.request-timeout=30000

app.notification.event-dedup-ttl-seconds=300
#logging.level.com.myorg.lsf.eventing=INFO

#logging.level.root=ERROR
logging.level.org.apache.kafka=ERROR
app.notification.legacy-order-status-listener.enabled=false