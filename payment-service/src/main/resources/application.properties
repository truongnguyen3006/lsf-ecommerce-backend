# Giảm xuống 50 để nhường tài nguyên cho MySQL.
# 50 connection xử lý thanh toán là cực nhanh rồi.
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Số luồng tối đa: Để cao hơn DB Pool một chút để xử lý logic khác
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=20

# Hàng đợi chờ (Backlog): QUAN TRỌNG ĐỂ KHÔNG BỊ "Connection Refused"
server.tomcat.accept-count=1000
server.tomcat.max-connections=8192
server.tomcat.connection-timeout=20000

#spring.kafka.consumer.auto-offset-reset=earliest
#spring.kafka.consumer.enable-auto-commit=false

#spring.kafka.listener.ack-mode=

#spring.kafka.listener.ack-mode=batch
#spring.kafka.listener.concurrency=4
#spring.kafka.producer.properties.delivery.timeout.ms=60000
#spring.kafka.producer.properties.max.request.size=1048576
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.hostname}:${server.port}:${random.uuid}
eureka.instance.prefer-ip-address=true
spring.mvc.async.request-timeout=20000

#logging.level.root=WARN
#logging.level.root=

#mới
lsf.kafka.bootstrap-servers=localhost:9092
lsf.kafka.schema-registry-url=http://localhost:8081

lsf.kafka.consumer.group-id=payment-group
lsf.kafka.consumer.auto-offset-reset=earliest
lsf.kafka.consumer.batch=false
lsf.kafka.consumer.concurrency=4
lsf.kafka.consumer.max-poll-records=1000

lsf.kafka.consumer.retry.attempts=3
lsf.kafka.consumer.retry.backoff=200ms

lsf.kafka.dlq.enabled=true
lsf.kafka.dlq.suffix=.DLQ

lsf.kafka.producer.acks=all
lsf.kafka.producer.idempotence=true
lsf.kafka.producer.retries=10
lsf.kafka.producer.max-in-flight=5
lsf.kafka.producer.compression=snappy
lsf.kafka.producer.linger-ms=5
lsf.kafka.producer.batch-size=65536
 
# Payment-result corridor is now envelope-native.
app.payment.order-validated-envelope-listener.enabled=true
app.payment.legacy-order-validated-listener.enabled=false
app.payment.order-validated.idempotency.store=memory
app.payment.order-validated.idempotency.require-redis=false
 
lsf.eventing.producer-name=${spring.application.name}
lsf.eventing.listener.enabled=${app.payment.order-validated-envelope-listener.enabled:true}
lsf.eventing.consume-topics[0]=order-validated-envelope-topic
lsf.eventing.ignore-unknown-event-type=true
lsf.eventing.idempotency.enabled=true
lsf.eventing.idempotency.store=${app.payment.order-validated.idempotency.store}
lsf.eventing.idempotency.require-redis=${app.payment.order-validated.idempotency.require-redis:false}
lsf.eventing.idempotency.key-prefix=lsf:payment:idemp:{groupId}:

# tắt eureka để test dễ dàng
#eureka.client.enabled=false

#observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.prometheus.metrics.export.enabled=true

lsf.observability.enabled=true
lsf.observability.mdc-enabled=true
lsf.observability.metrics-enabled=true
lsf.observability.tracing-enabled=true

lsf.observability.tag-topic=true
lsf.observability.tag-event-type=true
lsf.observability.tag-outcome=true
lsf.observability.tag-event-id=false
management.tracing.sampling.probability=1.0

logging.level.org.apache.kafka=ERROR
