# Service Identity
spring.application.name=product-service
server.port=8083

# Eureka Discovery
eureka.client.service-url.defaultZone=http://eureka:password@localhost:8761/eureka/

# Database (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/product-service?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.enabled=true
# Existing product tables predate Flyway; baseline them below the first LSF outbox migration
# so Flyway can create flyway_schema_history and still execute starter migrations V1..V3.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration,classpath:META-INF/spring/lsf/sql/mysql

# Cấu hình Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# === CẤU HÌNH TRACING (MICROMETER & ZIPKIN) ===
# ===============================================

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8085/realms/spring-boot-microservices-realm
# ==========================================================
# === SỬA LẠI KAFKA PRODUCER (ĐỂ GỬI EVENT CÓ MAGIC BYTE) ===
# ==========================================================

# Địa chỉ server Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Cấu hình "bộ mã hóa" (Serializer)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# 1. THÊM: Cung cấp địa chỉ Schema Registry (BẮT BUỘC)
spring.kafka.producer.properties.schema.registry.url=http://localhost:8081

# 2. SỬA: Thay thế Serializer JSON thô của Spring...
# spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# ...BẰNG Serializer JSON của Confluent Schema Registry
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.json.KafkaJsonSchemaSerializer

# 3. BỎ: Dòng này không còn cần thiết.
# Serializer của Confluent sẽ tự động đăng ký schema dựa trên class Java.
# spring.kafka.producer.properties.spring.json.type.mapping=productEvent:com.myexampleproject.productservice.event.ProductCreatedEvent

# Tăng số lượng kết nối tối đa từ 10 (mặc định) lên 50
spring.datasource.hikari.maximum-pool-size=50

# Giảm thời gian chờ kết nối (timeout) từ 30s xuống 10s
# (Thà báo lỗi nhanh còn hơn giữ user chờ)
spring.datasource.hikari.connection-timeout=10000
#logging.level.root=WARN

logging.level.root=ERROR

# observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus,beans,conditions
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.prometheus.metrics.export.enabled=true
management.tracing.sampling.probability=1.0

lsf.eventing.listener.enabled=false
lsf.observability.enabled=true
lsf.observability.mdc-enabled=true
lsf.observability.metrics-enabled=true
lsf.observability.tracing-enabled=true
lsf.observability.tag-topic=true
lsf.observability.tag-event-type=true
lsf.observability.tag-outcome=true
lsf.observability.tag-event-id=false

# lsf-outbox
lsf.outbox.enabled=true
lsf.outbox.table=lsf_outbox
lsf.outbox.metrics.enabled=true

# Keep starter writer/retry/lease behavior, but disable the default envelope publisher.
# Framework source currently has no public raw-payload publisher SPI for MySQL outbox.
# product-service therefore keeps a temporary bridge adapter to preserve existing raw Kafka contracts.
lsf.outbox.publisher.enabled=false
lsf.outbox.publisher.scheduling-enabled=true
lsf.outbox.publisher.poll-interval=1s
lsf.outbox.publisher.initial-delay=1s
lsf.outbox.publisher.batch-size=50
lsf.outbox.publisher.lease=10s
lsf.outbox.publisher.backoff-base=1s
lsf.outbox.publisher.backoff-max=60s
lsf.outbox.publisher.max-retries=10
lsf.outbox.publisher.send-timeout=10s
lsf.outbox.publisher.claim-strategy=SKIP_LOCKED
